<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Locked</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #1f2937;
        }

        .locked-wrapper {
            max-width: 560px;
            margin: auto;
            padding: 24px;
        }

        .locked-card {
            border: none;
            border-radius: 26px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, .10);
            overflow: hidden;
        }

        .locked-icon {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: #fee2e2;
            color: #dc2626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            margin: auto;
        }

        .page-title {
            font-weight: 900;
        }

        .page-subtitle {
            color: #6b7280;
            font-size: 15px;
        }

        .btn {
            border-radius: 14px;
            padding: 12px 15px;
            font-weight: 800;
        }
    </style>
</head>

<body>

{% include "includes/navbar.html" %}

<div class="locked-wrapper">

    <div class="card locked-card p-4 text-center mt-5">

        <div class="locked-icon mb-3">
            🔒
        </div>

        <h2 class="page-title">
            Dashboard Locked
        </h2>

        <p class="page-subtitle mb-4">
            You are currently unavailable for bookings. Turn on
            <strong>Available for Booking</strong> in the navbar to access available customer bookings.
        </p>

        <div class="alert alert-warning rounded-4 text-start">
            <strong>Status:</strong> Unavailable<br>
            <strong>Driver:</strong> {{ driver.full_name }}
        </div>

        <a href="{% url 'driver_accepted_bookings' %}" class="btn btn-outline-primary w-100 mb-2">
            View My Accepted Bookings
        </a>


    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
