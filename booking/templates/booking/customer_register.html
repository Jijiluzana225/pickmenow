<!DOCTYPE html>
<html>
<head>
    <title>Customer Registration</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .register-wrapper {
            max-width: 550px;
            margin: auto;
            padding: 20px;
        }

        .register-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,.08);
        }

        .page-title {
            font-weight: 900;
        }

        .page-subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .form-control {
            border-radius: 14px;
            padding: 12px 15px;
        }

        .input-group .form-control {
            border-radius: 14px 0 0 14px;
        }

        .input-group .btn {
            border-radius: 0 14px 14px 0;
        }

        .btn-primary {
            border-radius: 14px;
            padding: 13px;
            font-weight: 700;
        }

        .profile-preview {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #e5e7eb;
            display: block;
            margin: auto;
            background: #f3f4f6;
        }

        .upload-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-box label {
            cursor: pointer;
        }

        .camera-text {
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>

<body>

<div class="register-wrapper">

    <div class="card register-card p-4">

        <div class="text-center mb-4">
            <h2 class="page-title">
                Customer Registration
            </h2>

            <div class="page-subtitle">
                Create your account to book Habal-Habal rides.
            </div>
        </div>

        {% if error %}
        <div class="alert alert-danger rounded-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" onsubmit="return validatePasswords();">

            {% csrf_token %}

            <div class="upload-box">

                <img
                    src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                    id="preview"
                    class="profile-preview">

                <label class="btn btn-outline-primary mt-3">

                    Choose Profile Picture

                    <input
                        type="file"
                        name="profile_picture"
                        id="profile_picture"
                        accept="image/*"
                        required
                        hidden>

                </label>

                <div class="camera-text mt-2">
                    JPG, PNG or JPEG
                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    name="full_name"
                    class="form-control"
                    placeholder="Juan Dela Cruz"
                    value="{{ full_name|default:'' }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Contact Number
                </label>

                <input
                    type="text"
                    name="contact_number"
                    class="form-control"
                    placeholder="09XXXXXXXXX"
                    value="{{ contact_number|default:'' }}"
                    required>

                <small class="text-muted">
                    This will also be your username.
                </small>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Address
                </label>

                <textarea
                    name="address"
                    rows="3"
                    class="form-control"
                    placeholder="Complete Address">{{ address|default:'' }}</textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <div class="input-group">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Create Password"
                        required>

                    <button
                        class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword('password', this)">
                        👁
                    </button>

                </div>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Confirm Password
                </label>

                <div class="input-group">

                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        class="form-control"
                        placeholder="Confirm Password"
                        required>

                    <button
                        class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword('confirm_password', this)">
                        👁
                    </button>

                </div>

            </div>

            <button class="btn btn-primary w-100">
                Create Customer Account
            </button>

        </form>

        <hr class="my-4">

        <div class="text-center">

            <div class="text-muted mb-3">
                Already have an account?
            </div>

            <a
                href="{% url 'customer_login' %}"
                class="btn btn-outline-primary w-100">

                Login

            </a>

        </div>

    </div>

</div>

<script>

document.getElementById("profile_picture").addEventListener("change", function () {

    if (this.files && this.files[0]) {

        const reader = new FileReader();

        reader.onload = function(e){
            document.getElementById("preview").src = e.target.result;
        }

        reader.readAsDataURL(this.files[0]);
    }

});

function togglePassword(inputId, button){

    const input = document.getElementById(inputId);

    if(input.type==="password"){
        input.type="text";
        button.innerHTML="🙈";
    }else{
        input.type="password";
        button.innerHTML="👁";
    }

}

function validatePasswords(){

    const password=document.getElementById("password").value;
    const confirm=document.getElementById("confirm_password").value;

    if(password!==confirm){

        alert("Password and Confirm Password do not match.");

        document.getElementById("password").focus();

        return false;

    }

    return true;

}

{% if focus_password %}
window.onload=function(){
    document.getElementById("password").focus();
}
{% endif %}

</script>

</body>
</html>
