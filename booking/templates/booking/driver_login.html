<!DOCTYPE html>
<html>
<head>
    <title>Driver Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .login-wrapper {
            max-width: 480px;
            margin: auto;
            padding: 20px;
        }

        .login-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,.08);
        }

        .page-title {
            font-weight: 900;
        }

        .page-subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .form-control {
            border-radius: 14px;
            padding: 13px 15px;
        }

        .btn {
            border-radius: 14px;
            padding: 13px;
            font-weight: 800;
        }

        .login-section {
    background: linear-gradient(135deg, #eff6ff, #f8fafc);
    border: 1px solid #dbeafe;
    border-radius: 20px;
    padding: 18px;
    margin-top: 24px;
    text-align: center;
}

.login-section-title {
    font-weight: 900;
    color: #1f2937;
    margin-bottom: 4px;
}

.login-section-text {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 14px;
}

.btn-login-existing {
    border-radius: 14px;
    padding: 12px;
    font-weight: 900;
}
        
    </style>
</head>

<body>

<div class="login-wrapper">

    <div class="card login-card p-4 mt-5">

        <div class="text-center mb-4">
            <h2 class="page-title">Driver Login</h2>
            <div class="page-subtitle">
                Sign in to view and accept customer bookings.
            </div>
        </div>

        {% if error %}
            <div class="alert alert-danger rounded-4">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Contact Number</label>

                <input
                    type="text"
                    name="contact_number"
                    class="form-control"
                    placeholder="09XXXXXXXXX"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login as Driver
            </button>
        </form>

        <div class="login-section">
    

    <a
        href="{% url 'customer_login' %}"
        class="btn btn-outline-primary w-100 btn-login-existing">
        Customer Login
    </a>

</div>

        <div class="text-center mt-3">
            <small class="text-muted">Not yet registered?</small><br>
            <a href="{% url 'driver_register' %}" class="fw-bold text-decoration-none">
                Register as Driver
            </a>
        </div>

    </div>

</div>

</body>
</html>
