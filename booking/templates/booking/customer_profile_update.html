<!DOCTYPE html>
<html>
<head>
    <title>Update Customer Profile</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .profile-wrapper {
            max-width: 550px;
            margin: auto;
            padding: 20px;
        }

        .profile-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,.08);
        }

        .page-title {
            font-weight: 900;
        }

        .page-subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .form-control {
            border-radius: 14px;
            padding: 12px 15px;
        }

        .btn {
            border-radius: 14px;
            padding: 13px;
            font-weight: 700;
        }

        .profile-preview {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #e5e7eb;
            display: block;
            margin: auto;
            background: #f3f4f6;
        }

        .upload-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-box label {
            cursor: pointer;
        }

        .camera-text {
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>

<body>

<div class="profile-wrapper">

    <div class="card profile-card p-4">

        <div class="text-center mb-4">
            <h2 class="page-title">
                Update Profile
            </h2>

            <div class="page-subtitle">
                Edit your customer information and profile photo.
            </div>
        </div>

        {% if error %}
            <div class="alert alert-danger rounded-4">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="upload-box">

                {% if customer.profile_picture %}
                    <img
                        src="{{ customer.profile_picture.url }}"
                        id="preview"
                        class="profile-preview">
                {% else %}
                    <img
                        src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                        id="preview"
                        class="profile-preview">
                {% endif %}

                <label class="btn btn-outline-primary mt-3">
                    Change Profile Picture

                    <input
                        type="file"
                        name="profile_picture"
                        id="profile_picture"
                        accept="image/*"
                        hidden>
                </label>

                <div class="camera-text mt-2">
                    JPG, PNG or JPEG
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    name="full_name"
                    class="form-control"
                    value="{{ customer.full_name }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Contact Number
                </label>

                <input
                    type="text"
                    name="contact_number"
                    class="form-control"
                    value="{{ customer.contact_number }}"
                    required>

                <small class="text-muted">
                    This is also your login username.
                </small>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Address
                </label>

                <textarea
                    name="address"
                    rows="3"
                    class="form-control"
                    placeholder="Complete Address">{{ customer.address }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Save Changes
            </button>

            <a
                href="{% url 'customer_dashboard' %}"
                class="btn btn-outline-secondary w-100 mt-3">
                Cancel
            </a>

        </form>

    </div>

</div>

<script>
document.getElementById("profile_picture").addEventListener("change", function () {
    if (this.files && this.files[0]) {
        const reader = new FileReader();

        reader.onload = function (e) {
            document.getElementById("preview").src = e.target.result;
        };

        reader.readAsDataURL(this.files[0]);
    }
});
</script>

</body>
</html>
