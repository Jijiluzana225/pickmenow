<!DOCTYPE html>
<html>
<head>
    <title>Driver Registration</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .register-wrapper {
            max-width: 550px;
            margin: auto;
            padding: 20px;
        }

        .register-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,.08);
        }

        .page-title {
            font-weight: 900;
        }

        .page-subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .form-control {
            border-radius: 14px;
            padding: 12px 15px;
        }

        .btn-primary {
            border-radius: 14px;
            padding: 13px;
            font-weight: 700;
        }

        .profile-preview {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #e5e7eb;
            display: block;
            margin: auto;
            background: #f3f4f6;
        }

        .upload-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-box label {
            cursor: pointer;
        }

        .camera-text {
            font-size: 13px;
            color: #6b7280;
        }

        .login-section {
    background: linear-gradient(135deg, #eff6ff, #f8fafc);
    border: 1px solid #dbeafe;
    border-radius: 20px;
    padding: 18px;
    margin-top: 24px;
    text-align: center;
}

.login-section-title {
    font-weight: 900;
    color: #1f2937;
    margin-bottom: 4px;
}

.login-section-text {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 14px;
}

.btn-login-existing {
    border-radius: 14px;
    padding: 12px;
    font-weight: 900;
}
    </style>
</head>

<body>

{% if error %}
<script>
    alert("{{ error|escapejs }}");
</script>
{% endif %}
    
<div class="register-wrapper">

    <div class="card register-card p-4">

        <div class="text-center mb-4">
            <h2 class="page-title">
                Driver Registration
            </h2>

            <div class="page-subtitle">
                Register your motorcycle and wait for admin approval.
            </div>
        </div>

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="upload-box">

                <img
                    src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                    id="preview"
                    class="profile-preview">

                <label class="btn btn-outline-primary mt-3">
                    Choose Profile Picture

                    <input
                        type="file"
                        name="profile_picture"
                        id="profile_picture"
                        accept="image/*"                        
                        hidden>
                </label>

                <div class="camera-text mt-2">
                    JPG, PNG or JPEG
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">Full Name</label>

                <input
                    type="text"
                    name="full_name"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contact Number</label>

                <input
                    type="text"
                    name="contact_number"
                    class="form-control"
                    placeholder="09XXXXXXXXX"
                    required>

                <small class="text-muted">
                    This will also be your username.
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>

                <input
                    type="password"
                    name="password"
                    id="password"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>

                <input
                    type="password"
                    name="confirm_password"
                    id="confirm_password"
                    class="form-control"
                    required>

                <div id="passwordMessage" class="small mt-2"></div>
            </div>

            <div class="form-check mb-4">
                <input
                    class="form-check-input"
                    type="checkbox"
                    id="showPassword">

                <label class="form-check-label" for="showPassword">
                    Show Passwords
                </label>
            </div>

            <div class="mb-3">
                <label class="form-label">Motorcycle Model</label>

                <input
                    type="text"
                    name="motorcycle_model"
                    class="form-control"
                    placeholder="Honda Click 125"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Plate Number</label>

                <input
                    type="text"
                    name="plate_number"
                    class="form-control"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">Driver's License Number</label>

                <input
                    type="text"
                    name="license_number"
                    class="form-control">
            </div>

            <button class="btn btn-primary w-100">
                Register Driver
            </button>

        </form>

        <div class="login-section">

    <div class="login-section-title">
        Already registered?
    </div>

    <div class="login-section-text">
        Login to your account and continue using PickMeNow.
    </div>

    <a
        href="{% url 'customer_login' %}"
        class="btn btn-outline-primary w-100 btn-login-existing">
        Login Here
    </a>

</div>

    </div>

</div>

<script>
document.getElementById("profile_picture").addEventListener("change", function () {
    if (this.files && this.files[0]) {
        const reader = new FileReader();

        reader.onload = function (e) {
            document.getElementById("preview").src = e.target.result;
        };

        reader.readAsDataURL(this.files[0]);
    }
});

document.getElementById("showPassword").addEventListener("change", function () {
    const type = this.checked ? "text" : "password";

    document.getElementById("password").type = type;
    document.getElementById("confirm_password").type = type;
});

const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirm_password");
const message = document.getElementById("passwordMessage");

function checkPassword() {
    if (confirmPassword.value.length === 0) {
        message.innerHTML = "";
        return;
    }

    if (password.value === confirmPassword.value) {
        message.innerHTML = "✓ Passwords match";
        message.style.color = "#198754";
        confirmPassword.setCustomValidity("");
    } else {
        message.innerHTML = "✗ Passwords do not match";
        message.style.color = "#dc3545";
        confirmPassword.setCustomValidity("Passwords do not match");
    }
}

password.addEventListener("keyup", checkPassword);
confirmPassword.addEventListener("keyup", checkPassword);
</script>

</body>
</html>
